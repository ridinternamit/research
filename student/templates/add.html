<!DOCTYPE html>
<html>
<head>
    <title>Add Student</title>

    <!-- Bootstrap CSS -->
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">

    <style>
        body {
            background-color: #f2f6ff;
        }
        .form-box {
            background: white;
            padding: 30px;
            margin-top: 50px;
            border-radius: 10px;
            box-shadow: 0px 0px 10px gray;
        }
    </style>
</head>

<body>

<div class="container">
    <div class="col-md-6 mx-auto form-box">

        <h2 class="text-center text-primary mb-4">Add Student</h2>

        <form method="post">
            {% csrf_token %}

            <input type="text" name="name" placeholder="Name" class="form-control mb-3">

            <input type="email" name="email" placeholder="Email" class="form-control mb-3">

            <input type="text" name="course" placeholder="Course" class="form-control mb-3">

            <input type="number" name="marks" placeholder="Marks" class="form-control mb-3">

            <button type="submit" class="btn btn-success w-100">Save</button>
        </form>

    </div>
</div>

</body>
</html>
